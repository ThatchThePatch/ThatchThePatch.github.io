<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project | Thatcher Pacholl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-project-detail">
<header class="site-header">
    <div class="header-inner">
        <a class="logo" href="index.html#home">TP</a>
        <nav class="nav" aria-label="Primary">
            <a href="index.html#home">Home</a>
            <a href="index.html#about">About</a>
            <a href="index.html#projects">Projects</a>
            <a href="index.html#contact">Contact</a>
        </nav>
        <div class="header-tools">
            <button
                    type="button"
                    class="theme-toggle"
                    aria-label="Toggle light and dark theme"
                    title="Theme"
            >
                <span class="theme-icon theme-icon-moon" aria-hidden="true">☽</span>
                <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
            </button>
            <button
                    class="nav-toggle"
                    type="button"
                    aria-expanded="false"
                    aria-controls="nav-menu"
                    aria-label="Open menu"
            >
                <span class="nav-toggle-bar" aria-hidden="true"></span>
                <span class="nav-toggle-bar" aria-hidden="true"></span>
            </button>
        </div>
    </div>
    <div class="nav-mobile" id="nav-menu" hidden>
        <a href="index.html#home">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#projects">Projects</a>
        <a href="index.html#contact">Contact</a>
    </div>
</header>

<main class="project-detail-main">
    <div class="section-inner project-detail-inner">
        <div id="detail-not-found" class="detail-not-found" hidden>
            <p class="detail-not-found-text">This project could not be found.</p>
            <a class="detail-back" href="index.html#projects">← Back to projects</a>
        </div>

        <article id="detail-article" class="detail-article" hidden>
            <a class="detail-back" href="index.html#projects">← Back to projects</a>
            <h1 class="detail-title" id="detail-title"></h1>
            <p class="detail-tags" id="detail-tags"></p>

            <div class="detail-hero-card">
                <img id="detail-hero-img" src="" alt="" width="1200" height="700" />
            </div>

            <div class="detail-grid">
                <div class="detail-main">
                    <h2 class="detail-section-title">Overview</h2>
                    <div class="detail-overview" id="detail-overview"></div>
                    <h3 class="detail-highlights-heading">Key highlights:</h3>
                    <ul class="detail-highlights-list" id="detail-highlights"></ul>
                </div>
                <aside class="detail-sidebar" aria-label="Project metadata">
                    <div class="detail-sidebar-block">
                        <h4 class="detail-sidebar-heading detail-sidebar-heading-cyan">
                            Technologies
                        </h4>
                        <ul class="detail-sidebar-list" id="detail-tech"></ul>
                    </div>
                    <div class="detail-sidebar-block">
                        <h4 class="detail-sidebar-heading detail-sidebar-heading-gold">Year</h4>
                        <p class="detail-sidebar-value" id="detail-year"></p>
                    </div>
                    <div class="detail-sidebar-block">
                        <h4 class="detail-sidebar-heading detail-sidebar-heading-gold">
                            Additional Info
                        </h4>
                        <a
                                class="btn btn-ghost-gold"
                                id="detail-github"
                                href="#"
                                target="_blank"
                                rel="noopener noreferrer"
                        >View on GitHub</a>
                        <div id="image-modal" class="modal">
                            <span id="modal-close">&times;</span>
                            <div class="modal-content" id="modal-images"></div>
                        </div>
                    </div>
                </aside>
            </div>
        </article>
    </div>
</main>

<footer class="site-footer">
    <p class="footer-links">
        <a href="mailto:thatcheropacholl@gmail.com" target="_blank" rel="noopener noreferrer"
        >E-mail</a
        >
        <span class="footer-dot" aria-hidden="true">·</span>
        <a
                href="http://www.linkedin.com/in/thatcher-pacholl"
                target="_blank"
                rel="noopener noreferrer"
        >LinkedIn</a
        >
    </p>
    <p class="footer-copy">© <span id="year"></span> Thatcher Pacholl</p>
</footer>

<script src="projects-data.js"></script>
<script src="project-detail.js"></script>
</body>
</html>
